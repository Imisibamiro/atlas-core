name: GA

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run GA
        id: scraper
        run: bash scripts/ga.sh 2>&1 | tee /tmp/scraper-output.txt

      - name: Check new items
        id: check
        run: |
          N=$(wc -l < /tmp/gospel-new-items.json 2>/dev/null || echo 0)
          echo "count=${N}" >> "${GITHUB_OUTPUT}"
          echo "Found ${N} new items"

      - name: Build report + Discord payload
        if: steps.check.outputs.count > 0
        env:
          ITEMS_FILE: /tmp/gospel-new-items.json
          STATE_FILE: data/gospel-alerts-state.txt
          REPORT_FILE: data/ga-latest.md
        run: python3 scripts/ga-report.py

      - name: Commit state + report
        run: |
          git config user.name "ga-bot"
          git config user.email "ga@ngmcharts.com"
          git add data/
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "ga: update [skip ci]"
          git push

      - name: Send Discord
        if: steps.check.outputs.count > 0
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "${DISCORD_WEBHOOK_URL}" ] && { echo "No webhook secret"; exit 0; }
          curl -sS -f -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            -d @/tmp/discord-payload.json && echo "Sent OK"
