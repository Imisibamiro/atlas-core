        run: |
          set -euo pipefail
          OIDC_TOKEN=""
          for attempt in 1 2 3 4 5; do
            set +e
            RESPONSE=$(curl -sS -f --max-time 20 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
