name: "Run"

"on":
  workflow_dispatch:
    inputs:
      job:
        description: "Runner job"
        required: true
        default: "stale-retry"
        type: string
      source:
        description: "Dispatch source"
        required: false
        default: "manual"
        type: string
      cron:
        description: "Cron expression or manual marker"
        required: false
        default: "manual"
        type: string
      dispatched_at:
        description: "Dispatch timestamp"
        required: false
        type: string
      dry_run:
        description: "Run without writing changes"
        required: false
        default: "false"
        type: string
      max_items:
        description: "Optional item limit for smoke runs"
        required: false
        default: "0"
        type: string
      target_track_ids:
        description: "Optional comma-separated exact track IDs for a Spotify-only recovery"
        required: false
        default: ""
        type: string
      job_run_id:
        description: "Optional Cloudflare/admin job id to report back against"
        required: false
        default: ""
        type: string
      classifier_job_id:
        description: "Optional classifier job id that fanout finalization must wait for"
        required: false
        default: ""
        type: string
      classifier_timeout_seconds:
        description: "Classifier watchdog alert threshold in seconds"
        required: false
        default: "3600"
        type: string
      batch_size:
        description: "Optional classifier batch size"
        required: false
        default: "50"
        type: string
      include_legacy:
        description: "Whether classifier should include legacy unclassified rows"
        required: false
        default: "false"
        type: string
      skip_recalc:
        description: "Skip the chart recalc after finalize (sample/test runs only — protects the live preview)"
        required: false
        default: "false"
        type: string
      bundle_sha256:
        description: "Optional immutable runner bundle SHA-256 pin"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: ngmc-runner-${{ github.event.inputs.job || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    if: ${{ github.event.inputs.job != 'daily-refresh-fanout' && github.event.inputs.job != 'full-discovery-refresh-fanout' && github.event.inputs.job != 'daily-refresh-fanout-finalize' && github.event.inputs.job != 'full-discovery-refresh-fanout-finalize' && github.event.inputs.job != 'recalculate-live-chart' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RUNNER_JOB: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      SPOTIFY_TARGET_TRACK_IDS: ${{ github.event.inputs.target_track_ids }}
      NGMC_JOB_RUN_ID: ${{ github.event.inputs.job_run_id }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job_run_id }}
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.job_run_id }}
      CLASSIFIER_BATCH_SIZE: ${{ github.event.inputs.batch_size }}
      CLASSIFIER_INCLUDE_LEGACY: ${{ github.event.inputs.include_legacy }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=""
          for attempt in 1 2 3 4 5; do
            set +e
            RESPONSE=$(curl -sS -f --max-time 20 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner")
            curl_status=$?
            set -e
            if [ $curl_status -eq 0 ]; then
              TOKEN=$(printf '%s' "$RESPONSE" | jq -r '.value // empty' 2>/dev/null || true)
              if [ -n "${TOKEN}" ]; then
                OIDC_TOKEN="${TOKEN}"
                break
              fi
              echo "OIDC attempt ${attempt}: response had no .value (${#RESPONSE} bytes)"
            else
              echo "OIDC attempt ${attempt}: curl exit ${curl_status}"
            fi
            sleep $(( attempt * 3 ))
          done
          if [ -z "${OIDC_TOKEN}" ]; then
            echo "::error::OIDC token request failed after 5 attempts"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"
          echo "CHART_API_OIDC_TOKEN=${OIDC_TOKEN}" >> "${GITHUB_ENV}"
          echo "CLASSIFIER_API_TOKEN=${OIDC_TOKEN}" >> "${GITHUB_ENV}"

      - name: Fetch configuration
        id: keys
        run: |
          set -euo pipefail
          if [ -z "${KEY_BROKER_URL}" ]; then
            echo "KEY_BROKER_URL repo variable is not set"
            exit 1
          fi

          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${{ github.event.inputs.job }}\"}")

          OK=$(echo "${RESPONSE}" | jq -r '.ok // false')
          if [ "${OK}" != "true" ]; then
            echo "Key fetch failed"
            echo "${RESPONSE}" | jq -r '.error // "unknown_error"'
            exit 1
          fi

          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"

          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              if [ -n "${secret_line}" ]; then
                echo "::add-mask::${secret_line}"
              fi
            done <<< "${value}"
          done

          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"
          echo "ok=${OK}" >> "${GITHUB_OUTPUT}"
          echo "job=$(echo "${RESPONSE}" | jq -r '.job // ""')" >> "${GITHUB_OUTPUT}"
          echo "key_count=$(echo "${RESPONSE}" | jq -r '.keys | length')" >> "${GITHUB_OUTPUT}"

      - name: Fetch runner bundle
        id: runner-bundle
        env:
          RUNNER_BUNDLE_EXPECTED_SHA256: ${{ github.event.inputs.bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          node scripts/fetch-runner-bundle.mjs
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Cache bundle dependency downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/pip
          key: deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'package.json', '.runner-bundle/package-lock.json', '.runner-bundle/package.json', '.runner-bundle/pipelines/sp/package-lock.json', '.runner-bundle/pipelines/sp/package.json', '.runner-bundle/**/requirements.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache classifier models and audio previews
        if: ${{ github.event.inputs.job == 'classifier-classify' || github.event.inputs.job == 'classifier-retrain' }}
        uses: actions/cache@v4
        with:
          path: |
            .runner-bundle/.venv
            .runner-bundle/.cache/ngmc-classifier
            .runner-bundle/.cache/huggingface
            .runner-bundle/.cache/torch
            ~/.cache/huggingface
            ~/.cache/torch
          key: classifier-${{ runner.os }}-${{ runner.arch }}-py312-${{ hashFiles('.runner-bundle/scripts/classifier/requirements-classifier.txt', '.runner-bundle/models/ngmc_production_model.joblib') }}
          restore-keys: |
            classifier-${{ runner.os }}-${{ runner.arch }}-py312-

      - name: Install classifier audio backend
        if: ${{ github.event.inputs.job == 'classifier-classify' || github.event.inputs.job == 'classifier-retrain' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Prepare Playwright browser cache path
        run: mkdir -p ~/.cache/ms-playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.runner-bundle/pipelines/sp/package-lock.json', '.runner-bundle/pipelines/sp/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi
          if node -e "const p=require('./.runner-bundle/package.json'); process.exit(p.scripts && p.scripts.setup ? 0 : 1)" 2>/dev/null; then
            npm run setup --prefix .runner-bundle
          fi
          if [ -f .runner-bundle/requirements.txt ]; then
            pip install -r .runner-bundle/requirements.txt
          fi
          if [[ "${RUNNER_JOB}" == classifier-* ]] && [ -f .runner-bundle/scripts/classifier/requirements-classifier.txt ]; then
            python -m venv .runner-bundle/.venv
            . .runner-bundle/.venv/bin/activate
            if python -c 'import importlib; [importlib.import_module(name) for name in ("torch", "transformers", "librosa", "soundfile", "sklearn", "joblib", "requests")]'
            then
              echo "Classifier Python dependencies restored from cache"
            else
              python -m pip install --upgrade pip
              pip install -r .runner-bundle/scripts/classifier/requirements-classifier.txt
            fi
            echo "CLASSIFIER_PYTHON=${GITHUB_WORKSPACE}/.runner-bundle/.venv/bin/python" >> "${GITHUB_ENV}"
          fi

      - name: Run job
        id: run_job
        run: node scripts/run.mjs

      - name: Notify status
        if: always()
        run: |
          set -euo pipefail
          echo "Job completed: ${{ job.status }}"

          if [ -z "${KEY_BROKER_URL}" ]; then
            exit 0
          fi

          REPORT_OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
          if [ -z "${REPORT_OIDC_TOKEN}" ]; then
            echo "Report OIDC token request returned no token"
            exit 1
          fi
          echo "::add-mask::${REPORT_OIDC_TOKEN}"

          SUMMARY_JSON="{}"
          if [ -n "${RUNNER_SUMMARY_FILE:-}" ] && [ -f "${RUNNER_SUMMARY_FILE}" ]; then
            SUMMARY_JSON=$(jq -c . "${RUNNER_SUMMARY_FILE}" 2>/dev/null || echo "{}")
          fi

          REPORT_BODY=$(jq -n \
            --arg job "${RUNNER_JOB}" \
            --arg status "${{ job.status }}" \
            --arg outcome "${{ steps.run_job.outcome }}" \
            --arg conclusion "${{ steps.run_job.conclusion }}" \
            --arg source "${RUNNER_SOURCE}" \
            --arg cron "${RUNNER_CRON}" \
            --arg dispatched_at "${RUNNER_DISPATCHED_AT}" \
            --arg dry_run "${RUNNER_DRY_RUN}" \
            --arg max_items "${RUNNER_MAX_ITEMS}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --argjson summary "${SUMMARY_JSON}" \
            '{
              job: $job,
              status: $status,
              outcome: $outcome,
              conclusion: $conclusion,
              source: $source,
              cron: $cron,
              dispatched_at: $dispatched_at,
              dry_run: $dry_run,
              max_items: $max_items,
              repository: $repository,
              run_id: $run_id,
              run_attempt: $run_attempt,
              run_url: $run_url,
              summary: $summary
            }')

          # Broker report is best-effort: a non-2xx from the broker must NOT mark the
          # job failed when the actual work succeeded. Capture status and warn instead.
          REPORT_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/report" \
            -H "Authorization: Bearer ${REPORT_OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "${REPORT_BODY}" || echo "000")
          if [ "${REPORT_STATUS}" -ge 200 ] && [ "${REPORT_STATUS}" -lt 300 ]; then
            echo "Broker report accepted (HTTP ${REPORT_STATUS})"
          else
            echo "::warning::Broker report rejected (HTTP ${REPORT_STATUS}); not failing the job"
          fi

  recalculate:
    if: ${{ github.event.inputs.job == 'recalculate-live-chart' }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      RUNNER_JOB: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job_run_id || format('{0}:{1}:{2}', github.event.inputs.job, github.run_id, github.run_attempt) }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      SCRAPER_DB_TARGET: cloudflare
      NGMC_CAPTURE_PENDING_BASELINES: '1'
      RECALC_DB_TARGET: cloudflare
      NGMC_CORE_READ_TARGET: d1
      NGMC_CORE_WRITE_TARGET: d1
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=""
          for attempt in 1 2 3 4 5; do
            set +e
            RESPONSE=$(curl -sS -f --max-time 20 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner")
            curl_status=$?
            set -e
            if [ $curl_status -eq 0 ]; then
              TOKEN=$(printf '%s' "$RESPONSE" | jq -r '.value // empty' 2>/dev/null || true)
              if [ -n "${TOKEN}" ]; then
                OIDC_TOKEN="${TOKEN}"
                break
              fi
              echo "OIDC attempt ${attempt}: response had no .value (${#RESPONSE} bytes)"
            else
              echo "OIDC attempt ${attempt}: curl exit ${curl_status}"
            fi
            sleep $(( attempt * 3 ))
          done
          if [ -z "${OIDC_TOKEN}" ]; then
            echo "::error::OIDC token request failed after 5 attempts"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${{ github.event.inputs.job }}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        id: runner-bundle
        env:
          RUNNER_BUNDLE_EXPECTED_SHA256: ${{ github.event.inputs.bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          node scripts/fetch-runner-bundle.mjs
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi

      # Recalc trigger — POSTs the Cloudflare worker's native recalc endpoint,
      # which scores relational D1 and persists the admin preview. atlas-core runs
      # no recalc engine anymore; this step just fires the worker and gates on the
      # result (the worker's 300s CPU budget covers the recalc).
      - name: Recalculate live chart
        id: recalc
        run: |
          set -euo pipefail
          CLOUDFLARE_CHART_API_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CLOUDFLARE_CHART_API_REFRESH_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          if [ -z "${CLOUDFLARE_CHART_API_URL}" ] || [ -z "${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_CHART_API_URL or CLOUDFLARE_CHART_API_REFRESH_TOKEN missing from runner keys"
            echo "recalc_exit=1" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
          [ -n "${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" ] && echo "::add-mask::${CLOUDFLARE_CHART_API_REFRESH_TOKEN}"

          STARTED_AT=$(date -u +%s)
          set +e
          # Recalc is now WORKER-NATIVE: the Cloudflare worker scores the relational D1
          # store (buildNativeAdminScoring) and persists the saved preview. atlas-core no
          # longer runs the recalc engine (it was doc-store/Supabase-shaped and no-ops on
          # d1rel) — this step just triggers the worker and gates on its result.
          (
            HTTP_CODE=$(curl -sS -X POST \
              "${CLOUDFLARE_CHART_API_URL%/}/v1/admin/charts/recalculate-native?sync=1" \
              -H "Authorization: Bearer ${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" \
              -H "Accept: application/json" \
              -o /tmp/recalc-body.json -w '%{http_code}' || echo "000")
            echo "native recalc via worker: HTTP ${HTTP_CODE}"
            cat /tmp/recalc-body.json 2>/dev/null || true
            echo
            test "${HTTP_CODE}" = "200" && grep -q '"ok":true' /tmp/recalc-body.json
          ) | tee /tmp/recalc-log.txt
          RECALC_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          ELAPSED=$(($(date -u +%s) - STARTED_AT))

          if [ "${RECALC_EXIT_CODE}" -eq 0 ]; then
            echo "Recalc completed in ${ELAPSED}s (worker-native recalc on relational D1)."
            echo "recalc_exit=0" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "::error::Recalc script exited with ${RECALC_EXIT_CODE} after ${ELAPSED}s"
          echo "recalc_exit=${RECALC_EXIT_CODE}" >> "${GITHUB_OUTPUT}"
          exit "${RECALC_EXIT_CODE}"

  prepare-fanout:
    if: ${{ github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RUNNER_JOB: ${{ github.event.inputs.job }}-start
      RUNNER_KEY_JOB: daily-refresh-fanout-start
      RUNNER_PARENT_JOB: ${{ github.event.inputs.job }}
      RUNNER_FANOUT_JOB_KIND: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job_run_id || format('{0}:{1}:{2}', github.event.inputs.job, github.run_id, github.run_attempt) }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      SCRAPER_DB_TARGET: cloudflare
      NGMC_CAPTURE_PENDING_BASELINES: '1'
      RECALC_DB_TARGET: cloudflare
      NGMC_CORE_READ_TARGET: d1
      NGMC_CORE_WRITE_TARGET: d1
      # A refresh run id is not proof that a classifier job was dispatched.
      # Wait only when the scheduler supplies an explicit classifier handoff id.
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.classifier_job_id }}
      CLASSIFIER_TIMEOUT_SECONDS: ${{ github.event.inputs.classifier_timeout_seconds }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=""
          for attempt in 1 2 3 4 5; do
            set +e
            RESPONSE=$(curl -sS -f --max-time 20 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner")
            curl_status=$?
            set -e
            if [ $curl_status -eq 0 ]; then
              TOKEN=$(printf '%s' "$RESPONSE" | jq -r '.value // empty' 2>/dev/null || true)
              if [ -n "${TOKEN}" ]; then
                OIDC_TOKEN="${TOKEN}"
                break
              fi
              echo "OIDC attempt ${attempt}: response had no .value (${#RESPONSE} bytes)"
            else
              echo "OIDC attempt ${attempt}: curl exit ${curl_status}"
            fi
            sleep $(( attempt * 3 ))
          done
          if [ -z "${OIDC_TOKEN}" ]; then
            echo "::error::OIDC token request failed after 5 attempts"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${RUNNER_KEY_JOB:-$RUNNER_JOB}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        id: runner-bundle
        env:
          RUNNER_BUNDLE_EXPECTED_SHA256: ${{ github.event.inputs.bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          node scripts/fetch-runner-bundle.mjs
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi

      - name: Start fanout run
        id: start
        run: node scripts/run.mjs

      - name: Heal Apple metadata once before provider fanout
        env:
          RUNNER_JOB: ${{ github.event.inputs.job }}-prepare
        run: node scripts/run.mjs

  provider-fanout:
    needs: prepare-fanout
    if: ${{ github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout' }}
    runs-on: ubuntu-latest
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        part: [p1, p2, p3, p4, p5]
    env:
      RUNNER_JOB: refresh-part:${{ matrix.part }}
      RUNNER_KEY_JOB: refresh-part:${{ matrix.part }}
      RUNNER_PARENT_JOB: ${{ github.event.inputs.job }}
      RUNNER_FANOUT_JOB_KIND: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      RUNNER_TIMEOUT_MS: "17400000"
      SCRAPER_DB_TARGET: cloudflare
      NGMC_CAPTURE_PENDING_BASELINES: '1'
      RECALC_DB_TARGET: cloudflare
      NGMC_CORE_READ_TARGET: d1
      NGMC_CORE_WRITE_TARGET: d1
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.classifier_job_id }}
      CLASSIFIER_TIMEOUT_SECONDS: ${{ github.event.inputs.classifier_timeout_seconds }}
      # Compute the same stable id as prepare-fanout instead of transporting it
      # through a job output. GitHub suppresses outputs that overlap any masked
      # broker value, which can otherwise leave every provider shard with no id.
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job_run_id || format('{0}:{1}:{2}', github.event.inputs.job, github.run_id, github.run_attempt) }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=""
          for attempt in 1 2 3 4 5; do
            set +e
            RESPONSE=$(curl -sS -f --max-time 20 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner")
            curl_status=$?
            set -e
            if [ $curl_status -eq 0 ]; then
              TOKEN=$(printf '%s' "$RESPONSE" | jq -r '.value // empty' 2>/dev/null || true)
              if [ -n "${TOKEN}" ]; then
                OIDC_TOKEN="${TOKEN}"
                break
              fi
              echo "OIDC attempt ${attempt}: response had no .value (${#RESPONSE} bytes)"
            else
              echo "OIDC attempt ${attempt}: curl exit ${curl_status}"
            fi
            sleep $(( attempt * 3 ))
          done
          if [ -z "${OIDC_TOKEN}" ]; then
            echo "::error::OIDC token request failed after 5 attempts"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${RUNNER_KEY_JOB:-$RUNNER_JOB}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        id: runner-bundle
        env:
          RUNNER_BUNDLE_EXPECTED_SHA256: ${{ github.event.inputs.bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          node scripts/fetch-runner-bundle.mjs
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Cache bundle dependency downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/pip
          key: fanout-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.runner-bundle/package-lock.json', '.runner-bundle/package.json', '.runner-bundle/**/requirements.txt') }}
          restore-keys: |
            fanout-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare Playwright browser cache path
        run: mkdir -p ~/.cache/ms-playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: fanout-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.runner-bundle/package-lock.json', '.runner-bundle/package.json') }}
          restore-keys: |
            fanout-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi
          if node -e "const p=require('./.runner-bundle/package.json'); process.exit(p.scripts && p.scripts.setup ? 0 : 1)" 2>/dev/null; then
            npm run setup --prefix .runner-bundle
          fi
          if [ -f .runner-bundle/requirements.txt ]; then
            pip install -r .runner-bundle/requirements.txt
          fi

      - name: Run provider part
        run: node scripts/run.mjs

  finalize-fanout:
    needs: [prepare-fanout, provider-fanout]
    if: ${{ always() && (github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout' || github.event.inputs.job == 'daily-refresh-fanout-finalize' || github.event.inputs.job == 'full-discovery-refresh-fanout-finalize') }}
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      RUNNER_JOB: ${{ (github.event.inputs.job == 'daily-refresh-fanout-finalize' || github.event.inputs.job == 'full-discovery-refresh-fanout-finalize') && github.event.inputs.job || format('{0}-finalize', github.event.inputs.job) }}
      RUNNER_KEY_JOB: daily-refresh-fanout-finalize
      RUNNER_PARENT_JOB: ${{ github.event.inputs.job == 'daily-refresh-fanout-finalize' && 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout-finalize' && 'full-discovery-refresh-fanout' || github.event.inputs.job }}
      RUNNER_FANOUT_JOB_KIND: ${{ github.event.inputs.job == 'daily-refresh-fanout-finalize' && 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout-finalize' && 'full-discovery-refresh-fanout' || github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      PROVIDER_FANOUT_RESULT: ${{ needs.provider-fanout.result || 'manual' }}
      SCRAPER_DB_TARGET: cloudflare
      NGMC_CAPTURE_PENDING_BASELINES: '1'
      RECALC_DB_TARGET: cloudflare
      NGMC_CORE_READ_TARGET: d1
      NGMC_CORE_WRITE_TARGET: d1
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.classifier_job_id }}
      CLASSIFIER_TIMEOUT_SECONDS: ${{ github.event.inputs.classifier_timeout_seconds }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job_run_id || format('{0}:{1}:{2}', github.event.inputs.job, github.run_id, github.run_attempt) }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=""
          for attempt in 1 2 3 4 5; do
            set +e
            RESPONSE=$(curl -sS -f --max-time 20 \
              -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner")
            curl_status=$?
            set -e
            if [ $curl_status -eq 0 ]; then
              TOKEN=$(printf '%s' "$RESPONSE" | jq -r '.value // empty' 2>/dev/null || true)
              if [ -n "${TOKEN}" ]; then
                OIDC_TOKEN="${TOKEN}"
                break
              fi
              echo "OIDC attempt ${attempt}: response had no .value (${#RESPONSE} bytes)"
            else
              echo "OIDC attempt ${attempt}: curl exit ${curl_status}"
            fi
            sleep $(( attempt * 3 ))
          done
          if [ -z "${OIDC_TOKEN}" ]; then
            echo "::error::OIDC token request failed after 5 attempts"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${RUNNER_KEY_JOB:-$RUNNER_JOB}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        id: runner-bundle
        env:
          RUNNER_BUNDLE_EXPECTED_SHA256: ${{ github.event.inputs.bundle_sha256 }}
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          node scripts/fetch-runner-bundle.mjs
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi

      - name: Close failed provider fanout
        if: ${{ (github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout') && needs.provider-fanout.result != 'success' }}
        run: |
          set -euo pipefail
          CHART_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CHART_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          if [ -z "${CHART_URL}" ] || [ -z "${CHART_TOKEN}" ]; then
            echo "::warning::Cannot close failed provider refresh: chart API URL/token missing"
            exit 0
          fi
          echo "::add-mask::${CHART_TOKEN}"

          FAIL_BODY=$(jq -n \
            --arg run_id "${NGMC_REFRESH_RUN_ID}" \
            --arg stage "github_provider_fanout" \
            --arg error "Provider fanout result was ${PROVIDER_FANOUT_RESULT} in GitHub Actions ${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}" \
            '{run_id: $run_id, stage: $stage, error: $error}')
          set +e
          HTTP_CODE=$(curl -sS --connect-timeout 10 --max-time 30 \
            -o /tmp/provider-refresh-fail.json -w '%{http_code}' \
            -X POST "${CHART_URL%/}/v1/admin/provider-refresh/fail" \
            -H "Authorization: Bearer ${CHART_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "${FAIL_BODY}")
          CURL_EXIT=$?
          set -e
          if [ "${CURL_EXIT}" -eq 0 ] && [ "${HTTP_CODE}" -ge 200 ] && [ "${HTTP_CODE}" -lt 300 ] \
            && jq -e '.ok == true and .status == "failed"' /tmp/provider-refresh-fail.json >/dev/null 2>&1; then
            echo "Closed failed provider refresh ${NGMC_REFRESH_RUN_ID}; coordinator lease released."
            exit 0
          fi

          FAIL_ERROR=$(jq -r '.error // .message // "unknown_error"' /tmp/provider-refresh-fail.json 2>/dev/null || echo "unknown_error")
          echo "::warning::Could not close failed provider refresh ${NGMC_REFRESH_RUN_ID}: curl=${CURL_EXIT}, HTTP=${HTTP_CODE:-000}, error=${FAIL_ERROR}"

      - name: Check provider fanout result
        if: ${{ github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout' }}
        run: |
          set -euo pipefail
          if [ "${PROVIDER_FANOUT_RESULT}" != "success" ]; then
            echo "::error::Provider fanout did not complete successfully: ${PROVIDER_FANOUT_RESULT}"
            echo "Finalize is skipped because provider parts are incomplete."
            exit 1
          fi

      - name: Finalize fanout
        run: node scripts/run.mjs

      # Runner-side finalize — two steps: drain any pending snapshot writes from
      # the Cloudflare admin-jobs queue, then trigger the worker's native recalc
      # (worker scores relational D1 + persists the preview). No Supabase; no dump.
      - name: Process snapshot queue
        if: env.RUNNER_DRY_RUN != 'true'
        run: |
          set -euo pipefail
          CLOUDFLARE_CHART_API_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CLOUDFLARE_CHART_API_REFRESH_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          if [ -z "${CLOUDFLARE_CHART_API_URL}" ] || [ -z "${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_CHART_API_URL or CLOUDFLARE_CHART_API_REFRESH_TOKEN missing from runner keys"
            exit 1
          fi
          echo "::add-mask::${CLOUDFLARE_CHART_API_REFRESH_TOKEN}"
          (
            cd .runner-bundle
            CLOUDFLARE_CHART_API_URL="${CLOUDFLARE_CHART_API_URL}" \
              CLOUDFLARE_CHART_API_REFRESH_TOKEN="${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" \
              node --import tsx scripts/process-snapshot-write-queue.ts
          )

      - name: Wait for snapshot drain
        if: env.RUNNER_DRY_RUN != 'true' && github.event.inputs.skip_recalc != 'true' && vars.HOLD_RECALC != 'true'
        run: |
          set -euo pipefail
          # Confirm the snapshot ingest queue has fully SETTLED into D1 before recalc
          # scores. "Process snapshot queue" above triggers the drain, but the
          # ngmc-snapshot-ingest consumer writes track_snapshots asynchronously, so rows
          # can still be landing after that step returns. Scoring mid-drain builds a
          # transient chart (2026-07-09: RAISE AM hit #1 mid-drain, then settled to #44
          # once the queue finished). Poll the worker's exact count+max-id cursor until
          # it holds steady, then let recalc proceed. Bounded ~4 min; degrades gracefully.
          CHART_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CHART_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          [ -n "${CHART_TOKEN}" ] && echo "::add-mask::${CHART_TOKEN}"
          if [ -z "${CHART_URL}" ] || [ -z "${CHART_TOKEN}" ]; then
            echo "::warning::snapshot-drain: missing chart API url/token — skipping drain wait"
            exit 0
          fi
          STABLE=0
          PREV=""
          POLLS=0
          MAX_POLLS=40   # ~4 min ceiling at 6s/poll
          while [ "${POLLS}" -lt "${MAX_POLLS}" ]; do
            RESP=$(curl -sS --max-time 20 -H "Authorization: Bearer ${CHART_TOKEN}" "${CHART_URL}/v1/admin/charts/snapshot-drain-status" 2>/dev/null || echo "")
            CUR=$(printf '%s' "${RESP}" | jq -r '"\(.count)-\(.maxId)"' 2>/dev/null || echo "")
            POLLS=$((POLLS + 1))
            if [ -z "${CUR}" ] || [ "${CUR}" = "null-null" ]; then
              echo "snapshot-drain: status unreadable (poll ${POLLS}) — proceeding without wait"
              exit 0
            fi
            if [ "${CUR}" = "${PREV}" ]; then
              STABLE=$((STABLE + 1))
              if [ "${STABLE}" -ge 3 ]; then
                echo "snapshot-drain: quiescent at ${CUR} after ${POLLS} polls — recalc may proceed"
                exit 0
              fi
            else
              STABLE=1
              PREV="${CUR}"
            fi
            sleep 6
          done
          echo "::warning::snapshot-drain: still changing after ${POLLS} polls (last=${PREV}) — recalc will proceed on possibly-incomplete data"

      - name: Recalculate live chart
        if: env.RUNNER_DRY_RUN != 'true' && github.event.inputs.skip_recalc != 'true' && vars.HOLD_RECALC != 'true'
        id: recalc
        run: |
          set -euo pipefail
          CLOUDFLARE_CHART_API_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CLOUDFLARE_CHART_API_REFRESH_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          if [ -z "${CLOUDFLARE_CHART_API_URL}" ] || [ -z "${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_CHART_API_URL or CLOUDFLARE_CHART_API_REFRESH_TOKEN missing from runner keys"
            echo "recalc_exit=1" >> "${GITHUB_OUTPUT}"
            echo "{\"ok\":false,\"stage\":\"missing_env\"}" > /tmp/recalc-output.jsonl
            exit 1
          fi
          [ -n "${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" ] && echo "::add-mask::${CLOUDFLARE_CHART_API_REFRESH_TOKEN}"

          STARTED_AT=$(date -u +%s)
          set +e
          # Recalc is now WORKER-NATIVE: the Cloudflare worker scores the relational D1
          # store (buildNativeAdminScoring) and persists the saved preview. atlas-core no
          # longer runs the recalc engine (it was doc-store/Supabase-shaped and no-ops on
          # d1rel) — this step just triggers the worker and gates on its result.
          (
            HTTP_CODE=$(curl -sS -X POST \
              "${CLOUDFLARE_CHART_API_URL%/}/v1/admin/charts/recalculate-native?sync=1" \
              -H "Authorization: Bearer ${CLOUDFLARE_CHART_API_REFRESH_TOKEN}" \
              -H "Accept: application/json" \
              -o /tmp/recalc-body.json -w '%{http_code}' || echo "000")
            echo "native recalc via worker: HTTP ${HTTP_CODE}"
            cat /tmp/recalc-body.json 2>/dev/null || true
            echo
            test "${HTTP_CODE}" = "200" && grep -q '"ok":true' /tmp/recalc-body.json
          ) | tee /tmp/recalc-log.txt
          RECALC_EXIT_CODE=${PIPESTATUS[0]}
          set -e
          ELAPSED=$(($(date -u +%s) - STARTED_AT))

          # Persist the final "complete" JSON line for the report step. The
          # script prints a multi-line pretty JSON on success; join lines and
          # extract with jq so downstream still sees {"ok":true,...}.
          if [ "${RECALC_EXIT_CODE}" -eq 0 ]; then
            RECALC_JSON=$(tr -d '\n' < /tmp/recalc-log.txt | grep -oE '\{"ok":true,"stage":"complete"[^}]*\}' | tail -1 || true)
            if [ -z "${RECALC_JSON}" ]; then
              # Fallback: the pretty-printed complete block. Slurp with jq.
              RECALC_JSON=$(jq -Rs 'capture("(?<obj>\\{\\s*\"ok\":\\s*true[\\s\\S]*?\"stage\":\\s*\"complete\"[\\s\\S]*?\\})") | .obj | fromjson | tojson' /tmp/recalc-log.txt 2>/dev/null || echo "")
            fi
            [ -z "${RECALC_JSON}" ] && RECALC_JSON="{\"ok\":true,\"stage\":\"complete\",\"elapsedSec\":${ELAPSED}}"
            echo "Recalc completed in ${ELAPSED}s (worker-native recalc on relational D1)."
            echo "${RECALC_JSON}" > /tmp/recalc-output.jsonl
            echo "recalc_exit=0" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          echo "::error::Recalc script exited with ${RECALC_EXIT_CODE} after ${ELAPSED}s"
          echo "{\"ok\":false,\"stage\":\"error\",\"exitCode\":${RECALC_EXIT_CODE},\"elapsedSec\":${ELAPSED}}" > /tmp/recalc-output.jsonl
          echo "recalc_exit=${RECALC_EXIT_CODE}" >> "${GITHUB_OUTPUT}"
          exit "${RECALC_EXIT_CODE}"

      - name: Sync public data after recalculation
        if: env.RUNNER_DRY_RUN != 'true' && github.event.inputs.skip_recalc != 'true' && vars.HOLD_RECALC != 'true'
        run: |
          set -euo pipefail
          CHART_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CHART_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          if [ -z "${CHART_URL}" ] || [ -z "${CHART_TOKEN}" ]; then
            echo "::error::CLOUDFLARE_CHART_API_URL or CLOUDFLARE_CHART_API_REFRESH_TOKEN missing from runner keys"
            exit 1
          fi
          echo "::add-mask::${CHART_TOKEN}"

          ACCEPTED=$(curl -sS -f --connect-timeout 10 --max-time 30 -X POST \
            "${CHART_URL%/}/v1/admin/jobs/public-sync" \
            -H "Authorization: Bearer ${CHART_TOKEN}" \
            -H "Accept: application/json")
          if printf '%s' "${ACCEPTED}" | jq -e '.ok == true and .job == "public-sync"' >/dev/null; then
            echo "Public sync completed inline successfully."
            exit 0
          fi
          JOB_ID=$(printf '%s' "${ACCEPTED}" | jq -r '.jobId // .job_id // .job.id // empty')
          if [ -z "${JOB_ID}" ]; then
            echo "::error::Public sync did not return an admin job id"
            printf '%s\n' "${ACCEPTED}"
            exit 1
          fi
          echo "Public sync queued as ${JOB_ID}; waiting for terminal status."

          for attempt in $(seq 1 120); do
            STATUS_BODY=$(curl -sS -f --connect-timeout 10 --max-time 30 \
              "${CHART_URL%/}/v1/admin/jobs/${JOB_ID}/status" \
              -H "Authorization: Bearer ${CHART_TOKEN}" \
              -H "Accept: application/json")
            JOB_STATUS=$(printf '%s' "${STATUS_BODY}" | jq -r '.job.status // .status // "unknown"')
            case "${JOB_STATUS}" in
              succeeded|completed)
                echo "Public sync ${JOB_ID} completed successfully."
                exit 0
                ;;
              failed|timed_out|cancelled|canceled)
                JOB_ERROR=$(printf '%s' "${STATUS_BODY}" | jq -c '.job.error // .error // "unknown error"')
                echo "::error::Public sync ${JOB_ID} failed: ${JOB_ERROR}"
                exit 1
                ;;
            esac
            if [ $((attempt % 12)) -eq 0 ]; then
              echo "Waiting for public sync ${JOB_ID}: status=${JOB_STATUS}, attempt=${attempt}/120"
            fi
            sleep 5
          done
          echo "::error::Public sync ${JOB_ID} did not complete within 10 minutes"
          exit 1

      - name: Write refresh report
        if: always() && steps.recalc.outcome != 'skipped'
        env:
          RECALC_EXIT: ${{ steps.recalc.outputs.recalc_exit || '1' }}
        run: |
          set -euo pipefail
          SUMMARY="No recalculation output captured"
          RECALC_JSON="{}"
          if [ -f /tmp/recalc-output.jsonl ]; then
            RECALC_JSON=$(tail -1 /tmp/recalc-output.jsonl | jq -c . 2>/dev/null || echo "{}")
            SUMMARY=$(printf '%s' "${RECALC_JSON}" | python3 -c "import json,sys; d=json.load(sys.stdin); print(f\"Tracks: {d.get('processedTrackCount','?')}, Approved: {d.get('approvedTrackCount','?')}, Demoted: {d.get('demotedTrackCount','?')}, Chart-rule excluded: {d.get('chartRuleExcludedCount','?')}, Concurrency: {d.get('trackUpdateConcurrency','?')}, Elapsed: {d.get('elapsedSec','?')}s\")" 2>/dev/null || echo "Recalculation output was not valid JSON")
          fi

          {
            echo "## NGMC Refresh Report"
            echo
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Job | ${RUNNER_PARENT_JOB:-${RUNNER_JOB:-unknown}} |"
            echo "| Run ID | ${NGMC_REFRESH_RUN_ID:-${GITHUB_RUN_ID:-unknown}} |"
            echo "| Max items | ${RUNNER_MAX_ITEMS:-0} |"
            echo "| Dry run | ${RUNNER_DRY_RUN:-false} |"
            echo "| Recalculation exit | ${RECALC_EXIT} |"
            echo "| Summary | ${SUMMARY} |"
            echo "| Run URL | ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID} |"
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "::notice title=NGMC refresh report::${SUMMARY}; recalc_exit=${RECALC_EXIT}; max_items=${RUNNER_MAX_ITEMS:-0}"

          if [ -n "${KEY_BROKER_URL:-}" ]; then
            REPORT_OIDC_TOKEN=$(curl -sS --connect-timeout 10 --max-time 30 -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
            if [ -z "${REPORT_OIDC_TOKEN}" ]; then
              echo "Report OIDC token request returned no token"
              exit 1
            fi
            echo "::add-mask::${REPORT_OIDC_TOKEN}"

            if [ "${RECALC_EXIT}" -eq 0 ]; then
              RECALC_STATUS="success"
            else
              RECALC_STATUS="failure"
            fi

            REPORT_BODY=$(jq -n \
              --arg job "recalculate-live-chart" \
              --arg status "${RECALC_STATUS}" \
              --arg source "${RUNNER_SOURCE}" \
              --arg cron "${RUNNER_CRON}" \
              --arg dispatched_at "${RUNNER_DISPATCHED_AT}" \
              --arg dry_run "${RUNNER_DRY_RUN}" \
              --arg max_items "${RUNNER_MAX_ITEMS}" \
              --arg job_run_id "${NGMC_REFRESH_RUN_ID}" \
              --arg repository "${GITHUB_REPOSITORY}" \
              --arg run_id "${GITHUB_RUN_ID}" \
              --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
              --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              --arg recalc_exit "${RECALC_EXIT}" \
              --arg summary_text "${SUMMARY}" \
              --argjson recalc_summary "${RECALC_JSON}" \
              '{
                job: $job,
                status: $status,
                source: $source,
                cron: $cron,
                dispatched_at: $dispatched_at,
                dry_run: $dry_run,
                max_items: $max_items,
                job_run_id: $job_run_id,
                repository: $repository,
                run_id: $run_id,
                run_attempt: $run_attempt,
                run_url: $run_url,
                recalc_exit: $recalc_exit,
                summary: ($recalc_summary + {
                  jobRunId: $job_run_id,
                  recalcExit: $recalc_exit,
                  text: $summary_text
                })
              }')

            # Broker report is best-effort: a non-2xx must NOT fail the workflow when
            # the recalc itself succeeded. Capture status and warn on rejection.
            REPORT_STATUS=$(curl -sS --connect-timeout 10 --max-time 30 -o /dev/null -w "%{http_code}" -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/report" \
              -H "Authorization: Bearer ${REPORT_OIDC_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "${REPORT_BODY}" || echo "000")
            if [ "${REPORT_STATUS}" -ge 200 ] && [ "${REPORT_STATUS}" -lt 300 ]; then
              echo "Broker report accepted (HTTP ${REPORT_STATUS})"
            else
              echo "::warning::Broker report rejected (HTTP ${REPORT_STATUS}); not failing the job (recalc_exit=${RECALC_EXIT})"
            fi
          fi

      - name: Enforce provider refresh outcome
        if: always()
        run: |
          set -euo pipefail
          CHART_URL=$(jq -r '.CLOUDFLARE_CHART_API_URL // .CHART_API_WORKER_URL // .CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
          CHART_TOKEN=$(jq -r '.CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
          if [ -z "${CHART_URL}" ] || [ -z "${CHART_TOKEN}" ]; then
            echo "::error::Cannot enforce provider outcome: chart API URL/token missing"
            exit 1
          fi
          echo "::add-mask::${CHART_TOKEN}"

          STATUS_BODY=$(curl -sS -f --connect-timeout 10 --max-time 30 \
            "${CHART_URL%/}/v1/admin/provider-refresh/status?run_id=$(printf '%s' "${NGMC_REFRESH_RUN_ID}" | jq -sRr @uri)" \
            -H "Authorization: Bearer ${CHART_TOKEN}" \
            -H "Accept: application/json")
          RUN_STATUS=$(printf '%s' "${STATUS_BODY}" | jq -r '.run.status // "unknown"')
          GAPS=$(printf '%s' "${STATUS_BODY}" | jq -c '[.parts[]? | select(.outcome_status == "completed_with_gaps" or .outcome_status == "not_configured") | {provider,outcome_status,gap_count,coverage_pct,transient}]')
          case "${RUN_STATUS}" in
            completed|dry_run_completed)
              echo "Provider refresh ${NGMC_REFRESH_RUN_ID} is healthy: status=${RUN_STATUS}"
              ;;
            completed_with_gaps)
              echo "::error::Provider refresh completed with gaps after downstream processing: ${GAPS}"
              exit 1
              ;;
            *)
              RUN_ERROR=$(printf '%s' "${STATUS_BODY}" | jq -c '.run.finalizer_error // .run.error // "unknown error"')
              echo "::error::Provider refresh ended in unexpected state ${RUN_STATUS}: ${RUN_ERROR}"
              exit 1
              ;;
          esac
