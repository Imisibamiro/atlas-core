name: "Run"

"on":
  workflow_dispatch:
    inputs:
      job:
        description: "Runner job"
        required: true
        default: "stale-retry"
        type: string
      source:
        description: "Dispatch source"
        required: false
        default: "manual"
        type: string
      cron:
        description: "Cron expression or manual marker"
        required: false
        default: "manual"
        type: string
      dispatched_at:
        description: "Dispatch timestamp"
        required: false
        type: string
      dry_run:
        description: "Run without writing changes"
        required: false
        default: "false"
        type: string
      max_items:
        description: "Optional item limit for smoke runs"
        required: false
        default: "0"
        type: string
      job_run_id:
        description: "Optional Cloudflare/admin job id to report back against"
        required: false
        default: ""
        type: string
      classifier_job_id:
        description: "Optional classifier job id that fanout finalization must wait for"
        required: false
        default: ""
        type: string
      classifier_timeout_seconds:
        description: "Classifier watchdog alert threshold in seconds"
        required: false
        default: "3600"
        type: string
      batch_size:
        description: "Optional classifier batch size"
        required: false
        default: "50"
        type: string
      include_legacy:
        description: "Whether classifier should include legacy unclassified rows"
        required: false
        default: "false"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: ngmc-runner-${{ github.event.inputs.job || github.run_id }}
  cancel-in-progress: false

jobs:
  run:
    if: ${{ github.event.inputs.job != 'daily-refresh-fanout' && github.event.inputs.job != 'full-discovery-refresh-fanout' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      RUNNER_JOB: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      NGMC_JOB_RUN_ID: ${{ github.event.inputs.job_run_id }}
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.job_run_id }}
      CLASSIFIER_BATCH_SIZE: ${{ github.event.inputs.batch_size }}
      CLASSIFIER_INCLUDE_LEGACY: ${{ github.event.inputs.include_legacy }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
          if [ -z "${OIDC_TOKEN}" ]; then
            echo "OIDC token request returned no token"
            exit 1
          fi
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"
          echo "CHART_API_OIDC_TOKEN=${OIDC_TOKEN}" >> "${GITHUB_ENV}"
          echo "CLASSIFIER_API_TOKEN=${OIDC_TOKEN}" >> "${GITHUB_ENV}"

      - name: Fetch configuration
        id: keys
        run: |
          set -euo pipefail
          if [ -z "${KEY_BROKER_URL}" ]; then
            echo "KEY_BROKER_URL repo variable is not set"
            exit 1
          fi

          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${{ github.event.inputs.job }}\"}")

          OK=$(echo "${RESPONSE}" | jq -r '.ok // false')
          if [ "${OK}" != "true" ]; then
            echo "Key fetch failed"
            echo "${RESPONSE}" | jq -r '.error // "unknown_error"'
            exit 1
          fi

          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"

          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              if [ -n "${secret_line}" ]; then
                echo "::add-mask::${secret_line}"
              fi
            done <<< "${value}"
          done

          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"
          echo "ok=${OK}" >> "${GITHUB_OUTPUT}"
          echo "job=$(echo "${RESPONSE}" | jq -r '.job // ""')" >> "${GITHUB_OUTPUT}"
          echo "key_count=$(echo "${RESPONSE}" | jq -r '.keys | length')" >> "${GITHUB_OUTPUT}"

      - name: Fetch runner bundle
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          curl -sS -f -L "${KEY_BROKER_URL%/}/v1/internal/runner/bundle" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Accept: application/gzip" \
            -o /tmp/runner-bundle.tgz
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Cache bundle dependency downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/pip
          key: deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json', 'package.json', '.runner-bundle/package-lock.json', '.runner-bundle/package.json', '.runner-bundle/pipelines/sp/package-lock.json', '.runner-bundle/pipelines/sp/package.json', '.runner-bundle/**/requirements.txt') }}
          restore-keys: |
            deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache classifier models and audio previews
        if: ${{ github.event.inputs.job == 'classifier-classify' || github.event.inputs.job == 'classifier-retrain' }}
        uses: actions/cache@v4
        with:
          path: |
            .runner-bundle/.venv
            .runner-bundle/.cache/ngmc-classifier
            .runner-bundle/.cache/huggingface
            .runner-bundle/.cache/torch
            ~/.cache/huggingface
            ~/.cache/torch
          key: classifier-${{ runner.os }}-${{ runner.arch }}-py312-${{ hashFiles('.runner-bundle/scripts/classifier/requirements-classifier.txt', '.runner-bundle/models/ngmc_production_model.joblib') }}
          restore-keys: |
            classifier-${{ runner.os }}-${{ runner.arch }}-py312-

      - name: Install classifier audio backend
        if: ${{ github.event.inputs.job == 'classifier-classify' || github.event.inputs.job == 'classifier-retrain' }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Prepare Playwright browser cache path
        run: mkdir -p ~/.cache/ms-playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.runner-bundle/pipelines/sp/package-lock.json', '.runner-bundle/pipelines/sp/package.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi
          if node -e "const p=require('./.runner-bundle/package.json'); process.exit(p.scripts && p.scripts.setup ? 0 : 1)" 2>/dev/null; then
            npm run setup --prefix .runner-bundle
          fi
          if [ -f .runner-bundle/requirements.txt ]; then
            pip install -r .runner-bundle/requirements.txt
          fi
          if [[ "${RUNNER_JOB}" == classifier-* ]] && [ -f .runner-bundle/scripts/classifier/requirements-classifier.txt ]; then
            python -m venv .runner-bundle/.venv
            . .runner-bundle/.venv/bin/activate
            if python -c 'import importlib; [importlib.import_module(name) for name in ("torch", "transformers", "librosa", "soundfile", "sklearn", "joblib", "requests")]'
            then
              echo "Classifier Python dependencies restored from cache"
            else
              python -m pip install --upgrade pip
              pip install -r .runner-bundle/scripts/classifier/requirements-classifier.txt
            fi
            echo "CLASSIFIER_PYTHON=${GITHUB_WORKSPACE}/.runner-bundle/.venv/bin/python" >> "${GITHUB_ENV}"
          fi

      - name: Run job
        id: run_job
        run: node scripts/run.mjs

      - name: Notify status
        if: always()
        run: |
          set -euo pipefail
          echo "Job completed: ${{ job.status }}"

          if [ -z "${KEY_BROKER_URL}" ]; then
            exit 0
          fi

          REPORT_OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
          if [ -z "${REPORT_OIDC_TOKEN}" ]; then
            echo "Report OIDC token request returned no token"
            exit 1
          fi
          echo "::add-mask::${REPORT_OIDC_TOKEN}"

          SUMMARY_JSON="{}"
          if [ -n "${RUNNER_SUMMARY_FILE:-}" ] && [ -f "${RUNNER_SUMMARY_FILE}" ]; then
            SUMMARY_JSON=$(jq -c . "${RUNNER_SUMMARY_FILE}" 2>/dev/null || echo "{}")
          fi

          REPORT_BODY=$(jq -n \
            --arg job "${RUNNER_JOB}" \
            --arg status "${{ job.status }}" \
            --arg outcome "${{ steps.run_job.outcome }}" \
            --arg conclusion "${{ steps.run_job.conclusion }}" \
            --arg source "${RUNNER_SOURCE}" \
            --arg cron "${RUNNER_CRON}" \
            --arg dispatched_at "${RUNNER_DISPATCHED_AT}" \
            --arg dry_run "${RUNNER_DRY_RUN}" \
            --arg max_items "${RUNNER_MAX_ITEMS}" \
            --arg repository "${GITHUB_REPOSITORY}" \
            --arg run_id "${GITHUB_RUN_ID}" \
            --arg run_attempt "${GITHUB_RUN_ATTEMPT}" \
            --arg run_url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            --argjson summary "${SUMMARY_JSON}" \
            '{
              job: $job,
              status: $status,
              outcome: $outcome,
              conclusion: $conclusion,
              source: $source,
              cron: $cron,
              dispatched_at: $dispatched_at,
              dry_run: $dry_run,
              max_items: $max_items,
              repository: $repository,
              run_id: $run_id,
              run_attempt: $run_attempt,
              run_url: $run_url,
              summary: $summary
            }')

          curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/report" \
            -H "Authorization: Bearer ${REPORT_OIDC_TOKEN}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "${REPORT_BODY}" >/dev/null

  prepare-fanout:
    if: ${{ github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      run_id: ${{ steps.start.outputs.run_id }}
      snapshot_at: ${{ steps.start.outputs.snapshot_at }}
    env:
      RUNNER_JOB: ${{ github.event.inputs.job }}-start
      RUNNER_KEY_JOB: daily-refresh-fanout-start
      RUNNER_PARENT_JOB: ${{ github.event.inputs.job }}
      RUNNER_FANOUT_JOB_KIND: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job }}:${{ github.run_id }}:${{ github.run_attempt }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.classifier_job_id || github.event.inputs.job_run_id }}
      CLASSIFIER_TIMEOUT_SECONDS: ${{ github.event.inputs.classifier_timeout_seconds }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
          test -n "${OIDC_TOKEN}"
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${RUNNER_KEY_JOB:-$RUNNER_JOB}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          curl -sS -f -L "${KEY_BROKER_URL%/}/v1/internal/runner/bundle" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Accept: application/gzip" \
            -o /tmp/runner-bundle.tgz
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi

      - name: Start fanout run
        id: start
        run: node scripts/run.mjs

  provider-fanout:
    needs: prepare-fanout
    if: ${{ github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout' }}
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        part: [p1, p2, p3, p4, p5]
    env:
      RUNNER_JOB: refresh-part:${{ matrix.part }}
      RUNNER_KEY_JOB: refresh-part:${{ matrix.part }}
      RUNNER_PARENT_JOB: ${{ github.event.inputs.job }}
      RUNNER_FANOUT_JOB_KIND: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.classifier_job_id || github.event.inputs.job_run_id }}
      CLASSIFIER_TIMEOUT_SECONDS: ${{ github.event.inputs.classifier_timeout_seconds }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job }}:${{ github.run_id }}:${{ github.run_attempt }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
          test -n "${OIDC_TOKEN}"
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${RUNNER_KEY_JOB:-$RUNNER_JOB}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          curl -sS -f -L "${KEY_BROKER_URL%/}/v1/internal/runner/bundle" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Accept: application/gzip" \
            -o /tmp/runner-bundle.tgz
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Cache bundle dependency downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/.npm
            ~/.cache/pip
          key: fanout-deps-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.runner-bundle/package-lock.json', '.runner-bundle/package.json', '.runner-bundle/**/requirements.txt') }}
          restore-keys: |
            fanout-deps-${{ runner.os }}-${{ runner.arch }}-

      - name: Prepare Playwright browser cache path
        run: mkdir -p ~/.cache/ms-playwright

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: fanout-playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.runner-bundle/package-lock.json', '.runner-bundle/package.json') }}
          restore-keys: |
            fanout-playwright-${{ runner.os }}-${{ runner.arch }}-

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi
          if node -e "const p=require('./.runner-bundle/package.json'); process.exit(p.scripts && p.scripts.setup ? 0 : 1)" 2>/dev/null; then
            npm run setup --prefix .runner-bundle
          fi
          if [ -f .runner-bundle/requirements.txt ]; then
            pip install -r .runner-bundle/requirements.txt
          fi

      - name: Run provider part
        run: node scripts/run.mjs

  finalize-fanout:
    needs: [prepare-fanout, provider-fanout]
    if: ${{ always() && (github.event.inputs.job == 'daily-refresh-fanout' || github.event.inputs.job == 'full-discovery-refresh-fanout') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      RUNNER_JOB: ${{ github.event.inputs.job }}-finalize
      RUNNER_KEY_JOB: daily-refresh-fanout-finalize
      RUNNER_PARENT_JOB: ${{ github.event.inputs.job }}
      RUNNER_FANOUT_JOB_KIND: ${{ github.event.inputs.job }}
      RUNNER_SOURCE: ${{ github.event.inputs.source }}
      RUNNER_CRON: ${{ github.event.inputs.cron }}
      RUNNER_DISPATCHED_AT: ${{ github.event.inputs.dispatched_at }}
      RUNNER_DRY_RUN: ${{ github.event.inputs.dry_run }}
      RUNNER_MAX_ITEMS: ${{ github.event.inputs.max_items }}
      CLASSIFIER_JOB_ID: ${{ github.event.inputs.classifier_job_id || github.event.inputs.job_run_id }}
      CLASSIFIER_TIMEOUT_SECONDS: ${{ github.event.inputs.classifier_timeout_seconds }}
      NGMC_REFRESH_RUN_ID: ${{ github.event.inputs.job }}:${{ github.run_id }}:${{ github.run_attempt }}
      NGMC_REFRESH_SNAPSHOT_AT: ${{ github.event.inputs.dispatched_at }}
      KEY_BROKER_URL: ${{ vars.KEY_BROKER_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root deps
        run: npm install --omit=dev

      - name: Request OIDC token
        id: oidc
        run: |
          set -euo pipefail
          OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=atlas-runner" | jq -r '.value // ""')
          test -n "${OIDC_TOKEN}"
          echo "::add-mask::${OIDC_TOKEN}"
          echo "oidc_token=${OIDC_TOKEN}" >> "${GITHUB_OUTPUT}"

      - name: Fetch configuration
        run: |
          set -euo pipefail
          RESPONSE=$(curl -sS -f -X POST "${KEY_BROKER_URL%/}/v1/internal/runner/keys" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Content-Type: application/json" \
            -H "Accept: application/json" \
            -d "{\"job\": \"${RUNNER_KEY_JOB:-$RUNNER_JOB}\"}")
          test "$(echo "${RESPONSE}" | jq -r '.ok // false')" = "true"
          KEY_FILE="${RUNNER_TEMP}/runner-keys.json"
          umask 077
          echo "${RESPONSE}" | jq -c '.keys // {}' > "${KEY_FILE}"
          echo "${RESPONSE}" | jq -r '.keys | to_entries[] | @base64' | while IFS= read -r row; do
            value=$(echo "${row}" | base64 --decode | jq -r '.value')
            while IFS= read -r secret_line; do
              test -z "${secret_line}" || echo "::add-mask::${secret_line}"
            done <<< "${value}"
          done
          echo "RUNNER_KEY_FILE=${KEY_FILE}" >> "${GITHUB_ENV}"
          echo "RUNNER_SUMMARY_FILE=${RUNNER_TEMP}/runner-summary.json" >> "${GITHUB_ENV}"

      - name: Fetch runner bundle
        run: |
          set -euo pipefail
          mkdir -p .runner-bundle
          curl -sS -f -L "${KEY_BROKER_URL%/}/v1/internal/runner/bundle" \
            -H "Authorization: Bearer ${{ steps.oidc.outputs.oidc_token }}" \
            -H "Accept: application/gzip" \
            -o /tmp/runner-bundle.tgz
          tar -xzf /tmp/runner-bundle.tgz -C .runner-bundle

      - name: Install bundle deps
        run: |
          set -euo pipefail
          if [ -f .runner-bundle/package-lock.json ]; then
            npm ci --omit=dev --prefix .runner-bundle
          elif [ -f .runner-bundle/package.json ]; then
            npm install --omit=dev --prefix .runner-bundle
          fi

      - name: Finalize fanout
        run: node scripts/run.mjs

      - name: Recalculate live chart
        id: recalc
        env:
          CLOUDFLARE_CHART_API_URL: ""
          CLOUDFLARE_CHART_API_REFRESH_TOKEN: ""
        run: |
          set -euo pipefail
          # Export chart API credentials from runner keys
          if [ -f "${RUNNER_KEY_FILE}" ]; then
            CHART_URL=$(jq -r '.CHART_API_URL // .CLOUDFLARE_CHART_API_URL // ""' "${RUNNER_KEY_FILE}")
            CHART_TOKEN=$(jq -r '.CHART_API_REFRESH_TOKEN // .CLOUDFLARE_CHART_API_REFRESH_TOKEN // .CHART_API_TOKEN // ""' "${RUNNER_KEY_FILE}")
            if [ -n "${CHART_URL}" ]; then
              export CLOUDFLARE_CHART_API_URL="${CHART_URL}"
              echo "CLOUDFLARE_CHART_API_URL=${CHART_URL}" >> "${GITHUB_ENV}"
            fi
            if [ -n "${CHART_TOKEN}" ]; then
              export CLOUDFLARE_CHART_API_REFRESH_TOKEN="${CHART_TOKEN}"
              echo "::add-mask::${CHART_TOKEN}"
            fi
          fi
          cat > .runner-bundle/tsconfig.runner.json <<'JSON'
          {
            "compilerOptions": {
              "target": "ES2022",
              "baseUrl": ".",
              "module": "esnext",
              "moduleResolution": "bundler",
              "allowJs": true,
              "allowImportingTsExtensions": true,
              "esModuleInterop": true,
              "resolveJsonModule": true,
              "skipLibCheck": true,
              "paths": {
                "@/*": ["./src/*"]
              }
            },
            "include": [
              "src/**/*.ts",
              "src/**/*.tsx",
              "src/**/*.mts",
              "src/**/*.js",
              "scripts/**/*.ts",
              "scripts/**/*.mts",
              "scripts/**/*.js"
            ],
            "exclude": ["node_modules"]
          }
          JSON
          RECALC_EXIT=0
          npx tsx --tsconfig .runner-bundle/tsconfig.runner.json .runner-bundle/scripts/recalculate-live-chart.ts | tee /tmp/recalc-output.jsonl || RECALC_EXIT=$?
          echo "recalc_exit=${RECALC_EXIT}" >> "${GITHUB_OUTPUT}"
          if [ "${RECALC_EXIT}" -ne 0 ]; then
            echo "::warning::Recalculation exited with code ${RECALC_EXIT} — Cloudflare finalizer will attempt it as fallback"
          fi

      - name: Discord recalculation summary
        if: always() && steps.recalc.outcome != 'skipped'
        env:
          DISCORD_WEBHOOK: ${{ vars.DISCORD_WEBHOOK_URL || '' }}
          RECALC_EXIT: ${{ steps.recalc.outputs.recalc_exit || '1' }}
        run: |
          set -euo pipefail
          DISCORD_URL="${DISCORD_WEBHOOK}"
          if [ -z "${DISCORD_URL}" ]; then
            echo "No Discord webhook configured — skipping notification"
            exit 0
          fi
          RECALC_EXIT="${RECALC_EXIT:-1}"
          if [ "${RECALC_EXIT}" -eq 0 ]; then
            COLOR=0x22c55e
            STATUS="completed"
          else
            COLOR=0xef4444
            STATUS="failed (exit ${RECALC_EXIT})"
          fi
          LAST_LINE=$(grep -c '' /tmp/recalc-output.jsonl 2>/dev/null || echo 0)
          if [ -f /tmp/recalc-output.jsonl ]; then
            SUMMARY=$(tail -1 /tmp/recalc-output.jsonl | python3 -c "import json,sys; d=json.load(sys.stdin); print(f\"Tracks: {d.get('processedTrackCount','?')}, Approved: {d.get('approvedTrackCount','?')}, Elapsed: {d.get('elapsedSec','?')}s\")" 2>/dev/null || echo "N/A")
          else
            SUMMARY="No output captured"
          fi
          curl -s -H "Content-Type: application/json" -X POST "${DISCORD_URL}" \
            -d "{\"embeds\":[{\"title\":\"NGMC Recalculation ${STATUS}\",\"color\":${COLOR},\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"fields\":[{\"name\":\"Summary\",\"value\":\"${SUMMARY}\",\"inline\":false},{\"name\":\"Chart Week\",\"value\":\"$(date +%Y-%m-%d)\",\"inline\":true},{\"name\":\"Runner\",\"value\":\"Atlas Core (run #${GITHUB_RUN_NUMBER})\",\"inline\":true}]}]}" \
            || echo "Discord webhook failed (non-fatal)"
